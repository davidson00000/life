<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 18px; font-weight: 600; }
  .header-right { display: flex; gap: 8px; }
  .stats { padding: 12px 24px; color: var(--text-muted); font-size: 14px; display: flex; gap: 16px; }
  .stats span { font-weight: 600; color: var(--text); }

  /* Buttons */
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #1f2937; }
  .btn-primary {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .btn-primary:hover { background: #2ea043; }
  .btn-danger {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
  }
  .btn-danger:hover { background: #da3633; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .search-input {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    width: 200px;
  }
  .search-input::placeholder { color: var(--text-muted); }

  /* Labels */
  .label {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.6;
  }

  /* Board view */
  .board {
    display: flex;
    gap: 16px;
    padding: 24px;
    overflow-x: auto;
    min-height: calc(100vh - 180px);
  }
  .board-column {
    min-width: 280px;
    max-width: 320px;
    flex-shrink: 0;
  }
  .board-column-header {
    padding: 8px 12px;
    border-radius: 8px 8px 0 0;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .board-column-count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .board-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px 0;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card-closed { opacity: 0.5; }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .card-labels { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }

  /* List view */
  .list-view { padding: 0 24px 24px; }
  .list-row {
    display: grid;
    grid-template-columns: 60px 1fr auto auto 120px;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 14px;
    transition: background 0.1s;
  }
  .list-row:hover { background: rgba(88,166,255,0.05); }
  .list-number { color: var(--text-muted); font-size: 13px; }
  .list-title { font-weight: 500; }
  .list-state-open { color: var(--green); }
  .list-state-closed { color: var(--purple); }
  .list-date { color: var(--text-muted); font-size: 13px; text-align: right; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 90%;
    max-width: 640px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 20px; font-weight: 600; flex: 1; }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 24px;
    cursor: pointer;
    padding: 0 4px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { color: var(--text); font-size: 14px; }
  .modal-body h1, .modal-body h2, .modal-body h3 { margin: 16px 0 8px; }
  .modal-body p { margin: 8px 0; }
  .modal-body ul, .modal-body ol { margin: 8px 0; padding-left: 24px; }
  .modal-body code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .modal-body pre { background: var(--bg); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  .modal-body a { color: var(--accent); }
  .modal-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .modal-labels { display: flex; gap: 4px; flex-wrap: wrap; margin: 12px 0; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .form-input, .form-textarea {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .form-textarea { min-height: 120px; resize: vertical; }
  .label-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .label-option {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .label-option-selected { border-color: #fff; }

  /* Login */
  .login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .login-box h1 { font-size: 24px; margin-bottom: 8px; }
  .login-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
  .login-box .form-input { margin-bottom: 12px; text-align: center; }
  .login-warning {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--red);
    margin-bottom: 16px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    color: var(--text-muted);
  }
  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

const REPO = "davidson00000/life";
const API = "https://api.github.com";

const LABEL_COLORS = {
  ACS: "#0075ca",
  work: "#0e8a16",
  life: "#e4e669",
  learn: "#7057ff",
  idea: "#e99695",
  someday: "#cccccc",
  urgent: "#d93f0b",
  waiting: "#bfd4f2",
};
const LABEL_NAMES = Object.keys(LABEL_COLORS);

function contrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128 ? "#000" : "#fff";
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - new Date(date).getTime()) / 1000);
  if (s < 60) return `${s}秒前`;
  const m = Math.floor(s/60); if (m < 60) return `${m}分前`;
  const h = Math.floor(m/60); if (h < 24) return `${h}時間前`;
  const d = Math.floor(h/24); if (d < 30) return `${d}日前`;
  const mo = Math.floor(d/30); return `${mo}ヶ月前`;
}

function Label({ name }) {
  const bg = LABEL_COLORS[name] || "#666";
  return <span className="label" style={{ background: bg, color: contrastColor(bg) }}>{name}</span>;
}

// === API ===
async function fetchIssues(token, state) {
  const issues = [];
  let page = 1;
  while (true) {
    const res = await fetch(`${API}/repos/${REPO}/issues?state=${state}&per_page=100&page=${page}`, {
      headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" },
    });
    if (!res.ok) throw new Error(`API Error: ${res.status}`);
    const data = await res.json();
    if (data.length === 0) break;
    issues.push(...data.filter(i => !i.pull_request));
    if (data.length < 100) break;
    page++;
  }
  return issues;
}

async function createIssue(token, title, body, labels) {
  const res = await fetch(`${API}/repos/${REPO}/issues`, {
    method: "POST",
    headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ title, body, labels }),
  });
  if (!res.ok) throw new Error(`Create Error: ${res.status}`);
  return res.json();
}

async function closeIssue(token, number) {
  const res = await fetch(`${API}/repos/${REPO}/issues/${number}`, {
    method: "PATCH",
    headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ state: "closed" }),
  });
  if (!res.ok) throw new Error(`Close Error: ${res.status}`);
  return res.json();
}

async function reopenIssue(token, number) {
  const res = await fetch(`${API}/repos/${REPO}/issues/${number}`, {
    method: "PATCH",
    headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ state: "open" }),
  });
  if (!res.ok) throw new Error(`Reopen Error: ${res.status}`);
  return res.json();
}

// === Demo Data ===
function demoData() {
  return [
    { number: 1, title: "NISAの口座開設手続きをする", state: "open", labels: [{ name: "life" }], body: "## やること\nSBI証券でNISA口座を開設する\n\n## 期限\n2026-03-15", created_at: new Date(Date.now()-86400000*2).toISOString(), comments: 1 },
    { number: 2, title: "Claude Code のメモリ機能を調査する", state: "open", labels: [{ name: "ACS" }], body: "auto memory の挙動を検証する", created_at: new Date(Date.now()-86400000*5).toISOString(), comments: 0 },
    { number: 3, title: "確定申告の書類を準備する", state: "open", labels: [{ name: "life" }, { name: "urgent" }], body: "マイナンバーカード、源泉徴収票", created_at: new Date(Date.now()-86400000*7).toISOString(), comments: 3 },
    { number: 4, title: "AIエージェント×SaaS の事業案を検討する", state: "open", labels: [{ name: "idea" }], body: "ファクトチェックサービスの可能性", created_at: new Date(Date.now()-86400000).toISOString(), comments: 0 },
    { number: 5, title: "Rustの基礎を学習する", state: "open", labels: [{ name: "learn" }], body: "The Rust Programming Language を読む", created_at: new Date(Date.now()-86400000*10).toISOString(), comments: 2 },
    { number: 6, title: "ポートフォリオサイトを更新する", state: "open", labels: [{ name: "work" }], body: "", created_at: new Date(Date.now()-86400000*3).toISOString(), comments: 0 },
    { number: 7, title: "GraphRAGの技術調査をまとめる", state: "closed", labels: [{ name: "ACS" }], body: "LangChain + NetworkX の検証結果", created_at: new Date(Date.now()-86400000*14).toISOString(), comments: 4 },
    { number: 8, title: "健康診断の予約をする", state: "closed", labels: [{ name: "life" }], body: "", created_at: new Date(Date.now()-86400000*20).toISOString(), comments: 0 },
  ];
}

// === Components ===
function LoginScreen({ onLogin, onDemo }) {
  const [token, setToken] = useState("");
  return (
    <div className="login-container">
      <div className="login-box">
        <h1>Life Dashboard</h1>
        <p>davidson00000/life の Issues を管理</p>
        <div className="login-warning">
          トークンはブラウザの localStorage に保存されます。共有PCでの使用にご注意ください。
        </div>
        <input
          className="form-input"
          type="password"
          placeholder="GitHub Personal Access Token"
          value={token}
          onChange={e => setToken(e.target.value)}
          onKeyDown={e => e.key === "Enter" && token && onLogin(token)}
        />
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => token && onLogin(token)}>ログイン</button>
          <button className="btn" style={{ flex: 1 }} onClick={onDemo}>デモデータで見る</button>
        </div>
      </div>
    </div>
  );
}

function IssueCard({ issue, onClick }) {
  return (
    <div className={`card ${issue.state === "closed" ? "card-closed" : ""}`} onClick={() => onClick(issue)}>
      <div className="card-labels">
        {issue.labels.map(l => <Label key={l.name} name={l.name} />)}
      </div>
      <div className="card-title">{issue.title}</div>
      <div className="card-meta">
        <span>#{issue.number}</span>
        <span>{timeAgo(issue.created_at)}</span>
        {issue.comments > 0 && <span>💬 {issue.comments}</span>}
      </div>
    </div>
  );
}

function BoardView({ issues, onClickIssue }) {
  const columns = useMemo(() => {
    const cols = {};
    LABEL_NAMES.forEach(l => { cols[l] = []; });
    cols["other"] = [];
    issues.forEach(issue => {
      const matched = issue.labels.filter(l => LABEL_NAMES.includes(l.name));
      if (matched.length === 0) {
        cols["other"].push(issue);
      } else {
        matched.forEach(l => { cols[l.name].push(issue); });
      }
    });
    return cols;
  }, [issues]);

  return (
    <div className="board">
      {LABEL_NAMES.map(name => (
        columns[name].length > 0 && (
          <div className="board-column" key={name}>
            <div className="board-column-header" style={{ background: LABEL_COLORS[name] + "22" }}>
              <Label name={name} />
              <span className="board-column-count">{columns[name].length}</span>
            </div>
            <div className="board-cards">
              {columns[name].map(i => <IssueCard key={i.number} issue={i} onClick={onClickIssue} />)}
            </div>
          </div>
        )
      ))}
      {columns["other"].length > 0 && (
        <div className="board-column">
          <div className="board-column-header" style={{ background: "#66666622" }}>
            <span className="label" style={{ background: "#666", color: "#fff" }}>other</span>
            <span className="board-column-count">{columns["other"].length}</span>
          </div>
          <div className="board-cards">
            {columns["other"].map(i => <IssueCard key={i.number} issue={i} onClick={onClickIssue} />)}
          </div>
        </div>
      )}
    </div>
  );
}

function ListView({ issues, onClickIssue }) {
  return (
    <div className="list-view">
      {issues.map(issue => (
        <div className="list-row" key={issue.number} onClick={() => onClickIssue(issue)}>
          <span className="list-number">#{issue.number}</span>
          <span className="list-title">{issue.title}</span>
          <span>
            {issue.labels.map(l => <Label key={l.name} name={l.name} />)}
          </span>
          <span className={issue.state === "open" ? "list-state-open" : "list-state-closed"}>
            {issue.state === "open" ? "● Open" : "● Closed"}
          </span>
          <span className="list-date">{new Date(issue.created_at).toLocaleDateString("ja-JP")}</span>
        </div>
      ))}
    </div>
  );
}

function DetailModal({ issue, onClose, onCloseIssue, onReopenIssue, isDemo }) {
  const bodyHtml = useMemo(() => {
    if (!issue.body) return "<p style='color:var(--text-muted)'>（本文なし）</p>";
    return marked.parse(issue.body);
  }, [issue.body]);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">#{issue.number} {issue.title}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-labels">
          {issue.labels.map(l => <Label key={l.name} name={l.name} />)}
        </div>
        <div className="modal-body" dangerouslySetInnerHTML={{ __html: bodyHtml }} />
        <div className="modal-footer">
          <a href={issue.html_url || `https://github.com/${REPO}/issues/${issue.number}`}
             target="_blank" rel="noopener noreferrer" className="btn btn-sm">
            GitHub で開く ↗
          </a>
          <div style={{ display: "flex", gap: 8 }}>
            {!isDemo && issue.state === "open" && (
              <button className="btn btn-sm btn-danger" onClick={() => onCloseIssue(issue.number)}>
                Close Issue
              </button>
            )}
            {!isDemo && issue.state === "closed" && (
              <button className="btn btn-sm btn-primary" onClick={() => onReopenIssue(issue.number)}>
                Reopen Issue
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function NewIssueModal({ onClose, onCreate }) {
  const [title, setTitle] = useState("");
  const [body, setBody] = useState("");
  const [labels, setLabels] = useState([]);
  const [creating, setCreating] = useState(false);

  const toggleLabel = (name) => {
    setLabels(prev => prev.includes(name) ? prev.filter(l => l !== name) : [...prev, name]);
  };

  const handleCreate = async () => {
    if (!title.trim()) return;
    setCreating(true);
    await onCreate(title.trim(), body.trim(), labels);
    setCreating(false);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">New Issue</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="form-group">
          <label className="form-label">タイトル</label>
          <input className="form-input" placeholder="〇〇を△△する" value={title}
                 onChange={e => setTitle(e.target.value)}
                 onKeyDown={e => e.key === "Enter" && handleCreate()} />
        </div>
        <div className="form-group">
          <label className="form-label">本文（Markdown）</label>
          <textarea className="form-textarea" placeholder="詳細・背景・チェックリストなど..."
                    value={body} onChange={e => setBody(e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">ラベル</label>
          <div className="label-picker">
            {LABEL_NAMES.map(name => (
              <span key={name}
                    className={`label-option ${labels.includes(name) ? "label-option-selected" : ""}`}
                    style={{ background: LABEL_COLORS[name], color: contrastColor(LABEL_COLORS[name]) }}
                    onClick={() => toggleLabel(name)}>
                {name}
              </span>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
          <button className="btn" onClick={onClose}>キャンセル</button>
          <button className="btn btn-primary" onClick={handleCreate} disabled={creating || !title.trim()}>
            {creating ? "作成中..." : "作成する"}
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [token, setToken] = useState(() => localStorage.getItem("gh_token") || "");
  const [loggedIn, setLoggedIn] = useState(() => !!localStorage.getItem("gh_token"));
  const [isDemo, setIsDemo] = useState(false);
  const [issues, setIssues] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const [stateFilter, setStateFilter] = useState("open");
  const [labelFilter, setLabelFilter] = useState("ALL");
  const [viewMode, setViewMode] = useState("board");
  const [search, setSearch] = useState("");

  const [selectedIssue, setSelectedIssue] = useState(null);
  const [showNewIssue, setShowNewIssue] = useState(false);

  const loadIssues = useCallback(async () => {
    if (isDemo) { setIssues(demoData()); return; }
    if (!token) return;
    setLoading(true);
    setError("");
    try {
      const [open, closed] = await Promise.all([fetchIssues(token, "open"), fetchIssues(token, "closed")]);
      setIssues([...open, ...closed]);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, [token, isDemo]);

  useEffect(() => { if (loggedIn || isDemo) loadIssues(); }, [loggedIn, isDemo, loadIssues]);

  const handleLogin = (t) => {
    localStorage.setItem("gh_token", t);
    setToken(t);
    setLoggedIn(true);
    setIsDemo(false);
  };
  const handleDemo = () => { setIsDemo(true); setLoggedIn(false); };
  const handleLogout = () => {
    localStorage.removeItem("gh_token");
    setToken("");
    setLoggedIn(false);
    setIsDemo(false);
    setIssues([]);
  };

  const handleCloseIssue = async (number) => {
    try {
      await closeIssue(token, number);
      setIssues(prev => prev.map(i => i.number === number ? { ...i, state: "closed" } : i));
      setSelectedIssue(prev => prev ? { ...prev, state: "closed" } : null);
    } catch (e) { alert("Error: " + e.message); }
  };

  const handleReopenIssue = async (number) => {
    try {
      await reopenIssue(token, number);
      setIssues(prev => prev.map(i => i.number === number ? { ...i, state: "open" } : i));
      setSelectedIssue(prev => prev ? { ...prev, state: "open" } : null);
    } catch (e) { alert("Error: " + e.message); }
  };

  const handleCreateIssue = async (title, body, labels) => {
    try {
      const created = await createIssue(token, title, body, labels);
      setIssues(prev => [created, ...prev]);
    } catch (e) { alert("Error: " + e.message); }
  };

  const filtered = useMemo(() => {
    let result = issues;
    if (stateFilter !== "all") result = result.filter(i => i.state === stateFilter);
    if (labelFilter !== "ALL") result = result.filter(i => i.labels.some(l => l.name === labelFilter));
    if (search) {
      const q = search.toLowerCase();
      result = result.filter(i => i.title.toLowerCase().includes(q) || (i.body || "").toLowerCase().includes(q));
    }
    return result;
  }, [issues, stateFilter, labelFilter, search]);

  const openCount = issues.filter(i => i.state === "open").length;
  const closedCount = issues.filter(i => i.state === "closed").length;

  if (!loggedIn && !isDemo) return <LoginScreen onLogin={handleLogin} onDemo={handleDemo} />;

  return (
    <>
      <div className="header">
        <div className="header-left">
          <span className="header-title">davidson00000/life</span>
          {isDemo && <span className="label" style={{ background: "#e99695", color: "#000" }}>DEMO</span>}
        </div>
        <div className="header-right">
          {!isDemo && <button className="btn btn-primary" onClick={() => setShowNewIssue(true)}>+ New</button>}
          <button className="btn" onClick={loadIssues}>↻ Sync</button>
          <button className="btn" onClick={handleLogout}>Logout</button>
        </div>
      </div>

      <div className="stats">
        OPEN: <span>{openCount}</span> | CLOSED: <span>{closedCount}</span> | TOTAL: <span>{openCount + closedCount}</span>
      </div>

      <div className="filter-bar">
        <div className="filter-group">
          {["all","open","closed"].map(s => (
            <button key={s} className={`btn btn-sm ${stateFilter===s?"btn-active":""}`}
                    onClick={() => setStateFilter(s)}>
              {s.toUpperCase()}
            </button>
          ))}
          <span style={{ width: 8 }} />
          <button className={`btn btn-sm ${labelFilter==="ALL"?"btn-active":""}`}
                  onClick={() => setLabelFilter("ALL")}>ALL</button>
          {LABEL_NAMES.map(l => (
            <button key={l} className={`btn btn-sm ${labelFilter===l?"btn-active":""}`}
                    onClick={() => setLabelFilter(l)}>
              {l}
            </button>
          ))}
        </div>
        <div className="filter-group">
          <button className={`btn btn-sm ${viewMode==="board"?"btn-active":""}`}
                  onClick={() => setViewMode("board")}>Board</button>
          <button className={`btn btn-sm ${viewMode==="list"?"btn-active":""}`}
                  onClick={() => setViewMode("list")}>List</button>
          <input className="search-input" placeholder="🔍 Search..." value={search}
                 onChange={e => setSearch(e.target.value)} />
        </div>
      </div>

      {error && <div style={{ padding: "12px 24px", color: "var(--red)" }}>Error: {error}</div>}

      {loading ? (
        <div className="loading"><div className="spinner" /> 読み込み中...</div>
      ) : filtered.length === 0 ? (
        <div className="loading" style={{ color: "var(--text-muted)" }}>Issue が見つかりません</div>
      ) : viewMode === "board" ? (
        <BoardView issues={filtered} onClickIssue={setSelectedIssue} />
      ) : (
        <ListView issues={filtered} onClickIssue={setSelectedIssue} />
      )}

      {selectedIssue && (
        <DetailModal
          issue={selectedIssue}
          onClose={() => setSelectedIssue(null)}
          onCloseIssue={handleCloseIssue}
          onReopenIssue={handleReopenIssue}
          isDemo={isDemo}
        />
      )}

      {showNewIssue && (
        <NewIssueModal
          onClose={() => setShowNewIssue(false)}
          onCreate={handleCreateIssue}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
